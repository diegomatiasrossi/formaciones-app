<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<title>Crewficina — Logo</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f5f5f0; padding: 40px; }
h1 { font-size: 11px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: #888; margin-bottom: 32px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.panel { border-radius: 12px; padding: 36px 32px; display: flex; flex-direction: column; gap: 28px; align-items: flex-start; }
.panel-label { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: #aaa; margin-top: 12px; }
.logo-row { display: flex; align-items: center; gap: 14px; }
.wordmark { font-size: 20px; font-weight: 500; letter-spacing: -.01em; }
.i-gold { color: #C9A961; }
</style>
</head>

          <circle cx="14" cy="75" r="6.5"/><circle cx="14" cy="33" r="6.5"/>
          <circle cx="50" cy="54" r="6.5"/>
        </g>
      </svg>
      <span class="wordmark" style="color:#1a1a1a;">Crewfic<span class="i-gold">i</span>na</span>
