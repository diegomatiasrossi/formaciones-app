<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<title>Crewficina — Logo Preview</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f5f5f0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 48px; padding: 48px; }
.label { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: #aaa; margin-bottom: 20px; text-align: center; }
.panel { background: #fff; border: 1.5px solid #e8e6e0; border-radius: 16px; padding: 40px 48px; display: flex; flex-direction: column; align-items: center; gap: 36px; min-width: 400px; }
.panel.dark { background: #1a1a1a; border-color: #2a2a2a; }
.logo-row { display: flex; align-items: center; gap: 16px; }
.wordmark { font-size: 24px; font-weight: 500; letter-spacing: -.01em; color: #1a1a1a; }
.wordmark.light { color: #f5f5f0; }
.i-gold { color: #C9A961; }
.divider { width: 100%; height: 1px; background: #e8e6e0; }
.dark .divider { background: #2a2a2a; }
.sizes { display: flex; align-items: center; gap: 24px; }
</style>
</head>
<body>

<!-- Light panel -->
<div>
  <div class="label">Sobre fondo blanco / crema</div>
  <div class="panel">
    <!-- Large -->
    <div class="logo-row">
      <svg width="52" height="56" viewBox="0 0 100 108" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g stroke="#1a1a1a" stroke-width="13" stroke-linecap="butt" stroke-linejoin="miter">
          <path d="M32,22.5 L50,12 L68,22.5"/>
          <path d="M68,22.5 L86,33 L86,54"/>
          <path d="M86,54 L86,75 L68,85.5"/>
          <path d="M68,85.5 L50,96 L32,85.5"/>
          <path d="M32,85.5 L14,75 L14,54"/>
          <path d="M14,54 L14,33 L32,22.5"/>
        </g>
        <g fill="#1a1a1a">
          <circle cx="50" cy="12" r="6.5"/>
          <circle cx="86" cy="33" r="6.5"/>
          <circle cx="86" cy="75" r="6.5"/>
          <circle cx="50" cy="96" r="6.5"/>
          <circle cx="14" cy="75" r="6.5"/>
          <circle cx="14" cy="33" r="6.5"/>
          <circle cx="50" cy="54" r="6.5"/>
        </g>
      </svg>
      <span class="wordmark">Crewfic<span class="i-gold">i</span>na</span>
    </div>

    <div class="divider"></div>

    <!-- Sizes -->
    <div class="sizes">
      <svg width="40" height="43" viewBox="0 0 100 108" fill="none">
        <g stroke="#1a1a1a" stroke-width="13" stroke-linecap="butt" stroke-linejoin="miter">
          <path d="M32,22.5 L50,12 L68,22.5"/><path d="M68,22.5 L86,33 L86,54"/>
          <path d="M86,54 L86,75 L68,85.5"/><path d="M68,85.5 L50,96 L32,85.5"/>
          <path d="M32,85.5 L14,75 L14,54"/><path d="M14,54 L14,33 L32,22.5"/>
        </g>
        <g fill="#1a1a1a">
          <circle cx="50" cy="12" r="6.5"/><circle cx="86" cy="33" r="6.5"/>
          <circle cx="86" cy="75" r="6.5"/><circle cx="50" cy="96" r="6.5"/>
          <circle cx="14" cy="75" r="6.5"/><circle cx="14" cy="33" r="6.5"/>
          <circle cx="50" cy="54" r="6.5"/>
        </g>
      </svg>
      <svg width="28" height="30" viewBox="0 0 100 108" fill="none">
        <g stroke="#1a1a1a" stroke-width="13" stroke-linecap="butt" stroke-linejoin="miter">
          <path d="M32,22.5 L50,12 L68,22.5"/><path d="M68,22.5 L86,33 L86,54"/>
          <path d="M86,54 L86,75 L68,85.5"/><path d="M68,85.5 L50,96 L32,85.5"/>
          <path d="M32,85.5 L14,75 L14,54"/><path d="M14,54 L14,33 L32,22.5"/>
        </g>
        <g fill="#1a1a1a">
          <circle cx="50" cy="12" r="6.5"/><circle cx="86" cy="33" r="6.5"/>
          <circle cx="86" cy="75" r="6.5"/><circle cx="50" cy="96" r="6.5"/>
          <circle cx="14" cy="75" r="6.5"/><circle cx="14" cy="33" r="6.5"/>
          <circle cx="50" cy="54" r="6.5"/>
        </g>
      </svg>
      <svg width="20" height="22" viewBox="0 0 100 108" fill="none">
        <g stroke="#1a1a1a" stroke-width="13" stroke-linecap="butt" stroke-linejoin="miter">
          <path d="M32,22.5 L50,12 L68,22.5"/><path d="M68,22.5 L86,33 L86,54"/>
          <path d="M86,54 L86,75 L68,85.5"/><path d="M68,85.5 L50,96 L32,85.5"/>
          <path d="M32,85.5 L14,75 L14,54"/><path d="M14,54 L14,33 L32,22.5"/>
        </g>
        <g fill="#1a1a1a">
          <circle cx="50" cy="12" r="6.5"/><circle cx="86" cy="33" r="6.5"/>
          <circle cx="86" cy="75" r="6.5"/><circle cx="50" cy="96" r="6.5"/>
          <circle cx="14" cy="75" r="6.5"/><circle cx="14" cy="33" r="6.5"/>
          <circle cx="50" cy="54" r="6.5"/>
        </g>
      </svg>
      <div style="width:1px;height:30px;background:#e8e6e0;"></div>
      <!-- Favicon preview -->
      <div style="width:32px;height:32px;background:#f5f5f0;border:1px solid #e8e6e0;border-radius:6px;display:flex;align-items:center;justify-content:center;">
        <svg width="20" height="22" viewBox="0 0 100 108" fill="none">
          <g stroke="#1a1a1a" stroke-width="13" stroke-linecap="butt" stroke-linejoin="miter">
            <path d="M32,22.5 L50,12 L68,22.5"/><path d="M68,22.5 L86,33 L86,54"/>
            <path d="M86,54 L86,75 L68,85.5"/><path d="M68,85.5 L50,96 L32,85.5"/>
            <path d="M32,85.5 L14,75 L14,54"/><path d="M14,54 L14,33 L32,22.5"/>
          </g>
          <g fill="#1a1a1a">
            <circle cx="50" cy="12" r="6.5"/><circle cx="86" cy="33" r="6.5"/>
            <circle cx="86" cy="75" r="6.5"/><circle cx="50" cy="96" r="6.5"/>
            <circle cx="14" cy="75" r="6.5"/><circle cx="14" cy="33" r="6.5"/>
            <circle cx="50" cy="54" r="6.5"/>
          </g>
        </svg>
      </div>
    </div>
  </div>
</div>

<!-- Dark panel -->
<div>
  <div class="label">Sobre fondo oscuro</div>
  <div class="panel dark">
    <div class="logo-row">
      <svg width="52" height="56" viewBox="0 0 100 108" fill="none">
        <g stroke="#f5f5f0" stroke-width="13" stroke-linecap="butt" stroke-linejoin="miter">
          <path d="M32,22.5 L50,12 L68,22.5"/>
          <path d="M68,22.5 L86,33 L86,54"/>
          <path d="M86,54 L86,75 L68,85.5"/>
          <path d="M68,85.5 L50,96 L32,85.5"/>
          <path d="M32,85.5 L14,75 L14,54"/>
          <path d="M14,54 L14,33 L32,22.5"/>
        </g>
        <g fill="#f5f5f0">
          <circle cx="50" cy="12" r="6.5"/>
          <circle cx="86" cy="33" r="6.5"/>
          <circle cx="86" cy="75" r="6.5"/>
          <circle cx="50" cy="96" r="6.5"/>
          <circle cx="14" cy="75" r="6.5"/>
          <circle cx="14" cy="33" r="6.5"/>
          <circle cx="50" cy="54" r="6.5"/>
        </g>
      </svg>
      <span class="wordmark light">Crewfic<span class="i-gold">i</span>na</span>
    </div>
  </div>
</div>

</body>
</html>
